<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathfinding Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0d0f;
        --surface: #141416;
        --border: #1e1e22;
        --text: #e8e8ec;
        --dim: #4a4a55;
        --accent-bfs: #00d4ff;
        --accent-dfs: #ffd166;
        --accent-dijkstra: #06d6a0;
        --accent-astar: #ef476f;
        --cell-empty: #18181c;
        --cell-wall: #0a0a0c;
        --cell-start: #06d6a0;
        --cell-end: #ef476f;
        --cell-visited: #1a2a35;
        --cell-path: #00d4ff;
        --cell-visited-border: #003344;
        --font: "JetBrains Mono", monospace;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        min-height: 100vh;
        display: grid;
        grid-template-rows: 1fr;
        gap: 0;
        overflow: hidden;
      }

      .layout {
        display: grid;
        grid-template-columns: 200px 1fr;
        overflow: hidden;
      }

      .sidebar {
        border-right: 1px solid var(--border);
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow-y: auto;
      }

      .section-label {
        font-size: 9px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--dim);
        margin-bottom: 8px;
      }

      .algo-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .algo-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--dim);
        font-family: var(--font);
        font-size: 11px;
        padding: 7px 10px;
        text-align: left;
        cursor: pointer;
        transition: all 0.12s;
        letter-spacing: 0.04em;
        position: relative;
        overflow: hidden;
      }

      .algo-btn::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 2px;
        background: var(--accent);
        opacity: 0;
        transition: opacity 0.12s;
      }

      .algo-btn:hover {
        border-color: #333;
        color: var(--text);
      }
      .algo-btn.active {
        border-color: var(--accent);
        color: var(--accent);
      }
      .algo-btn.active::before {
        opacity: 1;
      }

      .algo-btn[data-algo="bfs"] {
        --accent: var(--accent-bfs);
      }
      .algo-btn[data-algo="dfs"] {
        --accent: var(--accent-dfs);
      }
      .algo-btn[data-algo="dijkstra"] {
        --accent: var(--accent-dijkstra);
      }
      .algo-btn[data-algo="astar"] {
        --accent: var(--accent-astar);
      }

      .tool-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .tool-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--dim);
        font-family: var(--font);
        font-size: 11px;
        padding: 7px 10px;
        text-align: left;
        cursor: pointer;
        transition: all 0.12s;
      }

      .tool-btn:hover {
        border-color: #333;
        color: var(--text);
      }
      .tool-btn.active {
        border-color: #333;
        color: var(--text);
        background: #1a1a1e;
      }

      .run-btn {
        background: var(--text);
        border: none;
        color: var(--bg);
        font-family: var(--font);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 10px;
        cursor: pointer;
        transition: opacity 0.1s;
      }

      .run-btn:hover {
        opacity: 0.85;
      }
      .run-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .clear-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--dim);
        font-family: var(--font);
        font-size: 11px;
        padding: 8px;
        cursor: pointer;
        transition: all 0.12s;
        letter-spacing: 0.06em;
      }

      .clear-btn:hover {
        border-color: #333;
        color: var(--text);
      }

      .stats {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-top: auto;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10px;
      }

      .stat-label {
        color: var(--dim);
      }
      .stat-value {
        color: var(--text);
        font-weight: 600;
      }
      .stat-value.colored {
        color: var(--accent-color, var(--text));
      }

      .canvas-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 24px;
      }

      canvas {
        display: block;
        cursor: crosshair;
        image-rendering: pixelated;
      }

      .legend-dot {
        width: 8px;
        height: 8px;
        border-radius: 1px;
        flex-shrink: 0;
      }

      .speed-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      input[type="range"] {
        width: 100%;
        accent-color: var(--text);
        height: 2px;
        margin: 4px 0;
      }
      .speed-labels {
        display: flex;
        justify-content: space-between;
        font-size: 9px;
        color: var(--dim);
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div>
          <div class="section-label">Algorithm</div>
          <div class="algo-group">
            <button class="algo-btn active" data-algo="bfs">BFS</button>
            <button class="algo-btn" data-algo="dfs">DFS</button>
            <button class="algo-btn" data-algo="dijkstra">Dijkstra</button>
            <button class="algo-btn" data-algo="astar">A*</button>
          </div>
        </div>

        <div>
          <div class="section-label">Tool</div>
          <div class="tool-group">
            <button class="tool-btn active" data-tool="wall">Draw walls</button>
            <button class="tool-btn" data-tool="start">Move start</button>
            <button class="tool-btn" data-tool="end">Move end</button>
          </div>
        </div>

        <div>
          <div class="section-label">Speed</div>
          <div class="speed-group">
            <input type="range" id="speed" min="1" max="5" value="3" />
            <div class="speed-labels"><span>slow</span><span>fast</span></div>
          </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 6px">
          <button class="run-btn" id="runBtn">▶ Run</button>
          <button class="clear-btn" id="clearBtn">Clear path</button>
          <button class="clear-btn" id="resetBtn">Reset grid</button>
          <button class="clear-btn" id="mazeBtn">Generate maze</button>
        </div>

        <div class="stats">
          <div class="section-label">Result</div>
          <div class="stat-row">
            <span class="stat-label">Visited</span>
            <span class="stat-value" id="statVisited">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Path length</span>
            <span class="stat-value" id="statPath">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Status</span>
            <span
              class="stat-value colored"
              id="statStatus"
              style="--accent-color: var(--dim)"
              >idle</span
            >
          </div>
        </div>
      </aside>

      <div class="canvas-wrap">
        <canvas id="grid"></canvas>
      </div>
    </div>

    <script>
      const COLS = 60;
      const ROWS = 34;
      const CELL = 16;
      const GAP = 1;

      const EMPTY = 0,
        WALL = 1,
        START = 2,
        END = 3,
        VISITED = 4,
        PATH = 5;

      const COLORS = {
        [EMPTY]: "#18181c",
        [WALL]: "#0a0a0c",
        [START]: "#06d6a0",
        [END]: "#ef476f",
        [VISITED]: "#1a2a35",
        [PATH]: "#00d4ff",
      };

      const canvas = document.getElementById("grid");
      const ctx = canvas.getContext("2d");
      canvas.width = COLS * (CELL + GAP) - GAP;
      canvas.height = ROWS * (CELL + GAP) - GAP;

      let grid = [];
      let startCell = { r: 5, c: 5 };
      let endCell = { r: ROWS - 6, c: COLS - 6 };
      let currentAlgo = "bfs";
      let currentTool = "wall";
      let isRunning = false;
      let mouseDown = false;
      let erasing = false;
      let animCancel = false;

      function initGrid() {
        grid = Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
        grid[startCell.r][startCell.c] = START;
        grid[endCell.r][endCell.c] = END;
      }

      function drawCell(r, c) {
        const x = c * (CELL + GAP);
        const y = r * (CELL + GAP);
        ctx.fillStyle = COLORS[grid[r][c]];
        ctx.fillRect(x, y, CELL, CELL);
        if (grid[r][c] === PATH) {
          ctx.fillStyle = "rgba(0,212,255,0.08)";
          ctx.fillRect(x, y, CELL, CELL);
        }
      }

      function drawAll() {
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++) drawCell(r, c);
      }

      function cellFromEvent(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        const c = Math.floor(x / (CELL + GAP));
        const r = Math.floor(y / (CELL + GAP));
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
        return { r, c };
      }

      function applyTool(r, c) {
        if (grid[r][c] === START || grid[r][c] === END) return;
        if (currentTool === "wall") {
          grid[r][c] = erasing ? EMPTY : WALL;
          drawCell(r, c);
        } else if (currentTool === "start") {
          grid[startCell.r][startCell.c] = EMPTY;
          drawCell(startCell.r, startCell.c);
          startCell = { r, c };
          grid[r][c] = START;
          drawCell(r, c);
        } else if (currentTool === "end") {
          grid[endCell.r][endCell.c] = EMPTY;
          drawCell(endCell.r, endCell.c);
          endCell = { r, c };
          grid[r][c] = END;
          drawCell(r, c);
        }
      }

      canvas.addEventListener("mousedown", (e) => {
        const cell = cellFromEvent(e);
        if (!cell || isRunning) return;
        mouseDown = true;
        erasing = grid[cell.r][cell.c] === WALL;
        applyTool(cell.r, cell.c);
      });

      canvas.addEventListener("mousemove", (e) => {
        if (!mouseDown || isRunning) return;
        const cell = cellFromEvent(e);
        if (cell) applyTool(cell.r, cell.c);
      });

      window.addEventListener("mouseup", () => (mouseDown = false));

      function key(r, c) {
        return r * COLS + c;
      }
      function fromKey(k) {
        return { r: Math.floor(k / COLS), c: k % COLS };
      }

      function neighbors(r, c) {
        return [
          [-1, 0],
          [1, 0],
          [0, -1],
          [0, 1],
        ]
          .map(([dr, dc]) => [r + dr, c + dc])
          .filter(
            ([nr, nc]) =>
              nr >= 0 &&
              nr < ROWS &&
              nc >= 0 &&
              nc < COLS &&
              grid[nr][nc] !== WALL,
          );
      }

      function bfs() {
        const visited = [];
        const parent = new Map();
        const queue = [key(startCell.r, startCell.c)];
        parent.set(queue[0], null);

        while (queue.length > 0) {
          const cur = queue.shift();
          visited.push(cur);
          const { r, c } = fromKey(cur);
          if (r === endCell.r && c === endCell.c)
            return { visited, parent, found: true };
          for (const [nr, nc] of neighbors(r, c)) {
            const nk = key(nr, nc);
            if (!parent.has(nk)) {
              parent.set(nk, cur);
              queue.push(nk);
            }
          }
        }
        return { visited, parent, found: false };
      }

      function dfs() {
        const visited = [];
        const parent = new Map();
        const stack = [key(startCell.r, startCell.c)];
        const seen = new Set();
        parent.set(stack[0], null);

        while (stack.length > 0) {
          const cur = stack.pop();
          if (seen.has(cur)) continue;
          seen.add(cur);
          visited.push(cur);
          const { r, c } = fromKey(cur);
          if (r === endCell.r && c === endCell.c)
            return { visited, parent, found: true };
          for (const [nr, nc] of neighbors(r, c)) {
            const nk = key(nr, nc);
            if (!parent.has(nk)) {
              parent.set(nk, cur);
              stack.push(nk);
            }
          }
        }
        return { visited, parent, found: false };
      }

      function dijkstra() {
        const dist = new Map();
        const parent = new Map();
        const visited = [];
        const startK = key(startCell.r, startCell.c);

        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++) dist.set(key(r, c), Infinity);

        dist.set(startK, 0);
        parent.set(startK, null);

        const heap = [[0, startK]];

        while (heap.length > 0) {
          heap.sort((a, b) => a[0] - b[0]);
          const [d, cur] = heap.shift();
          if (visited.includes(cur)) continue;
          visited.push(cur);
          const { r, c } = fromKey(cur);
          if (r === endCell.r && c === endCell.c)
            return { visited, parent, found: true };
          for (const [nr, nc] of neighbors(r, c)) {
            const nk = key(nr, nc);
            const nd = d + 1;
            if (nd < dist.get(nk)) {
              dist.set(nk, nd);
              parent.set(nk, cur);
              heap.push([nd, nk]);
            }
          }
        }
        return { visited, parent, found: false };
      }

      function astar() {
        const g = new Map();
        const parent = new Map();
        const visited = [];
        const startK = key(startCell.r, startCell.c);

        const h = (r, c) => Math.abs(r - endCell.r) + Math.abs(c - endCell.c);

        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++) g.set(key(r, c), Infinity);

        g.set(startK, 0);
        parent.set(startK, null);

        const heap = [[h(startCell.r, startCell.c), startK]];

        while (heap.length > 0) {
          heap.sort((a, b) => a[0] - b[0]);
          const [, cur] = heap.shift();
          if (visited.includes(cur)) continue;
          visited.push(cur);
          const { r, c } = fromKey(cur);
          if (r === endCell.r && c === endCell.c)
            return { visited, parent, found: true };
          for (const [nr, nc] of neighbors(r, c)) {
            const nk = key(nr, nc);
            const ng = g.get(cur) + 1;
            if (ng < g.get(nk)) {
              g.set(nk, ng);
              parent.set(nk, cur);
              heap.push([ng + h(nr, nc), nk]);
            }
          }
        }
        return { visited, parent, found: false };
      }

      function buildPath(parent, endK) {
        const path = [];
        let cur = endK;
        while (cur !== null) {
          path.unshift(cur);
          cur = parent.get(cur);
        }
        return path;
      }

      function sleep(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }

      function getDelay() {
        const v = parseInt(document.getElementById("speed").value);
        return [30, 18, 8, 3, 0][v - 1];
      }

      function clearPath() {
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            if (grid[r][c] === VISITED || grid[r][c] === PATH) {
              grid[r][c] = EMPTY;
              drawCell(r, c);
            }
        document.getElementById("statVisited").textContent = "—";
        document.getElementById("statPath").textContent = "—";
        document.getElementById("statStatus").textContent = "idle";
        document
          .getElementById("statStatus")
          .style.setProperty("--accent-color", "var(--dim)");
      }

      async function run() {
        if (isRunning) {
          animCancel = true;
          return;
        }
        clearPath();
        animCancel = false;
        isRunning = true;
        document.getElementById("runBtn").textContent = "■ Stop";
        document.getElementById("statStatus").textContent = "running";
        document
          .getElementById("statStatus")
          .style.setProperty("--accent-color", "var(--accent-dijkstra)");

        const algos = { bfs, dfs, dijkstra, astar };
        const { visited, parent, found } = algos[currentAlgo]();

        const delay = getDelay();
        let i = 0;

        for (const k of visited) {
          if (animCancel) break;
          const { r, c } = fromKey(k);
          if (grid[r][c] !== START && grid[r][c] !== END) {
            grid[r][c] = VISITED;
            drawCell(r, c);
          }
          document.getElementById("statVisited").textContent = ++i;
          if (delay > 0) await sleep(delay);
        }

        const endK = key(endCell.r, endCell.c);
        const path = found ? buildPath(parent, endK) : [];

        for (const k of path) {
          if (animCancel) break;
          const { r, c } = fromKey(k);
          if (grid[r][c] !== START && grid[r][c] !== END) {
            grid[r][c] = PATH;
            drawCell(r, c);
          }
          if (delay > 0) await sleep(delay > 4 ? delay * 2 : delay);
        }

        document.getElementById("statPath").textContent = found
          ? path.length
          : "—";
        document.getElementById("statStatus").textContent = animCancel
          ? "stopped"
          : found
            ? "found"
            : "no path";
        document
          .getElementById("statStatus")
          .style.setProperty(
            "--accent-color",
            animCancel
              ? "var(--dim)"
              : found
                ? "var(--accent-dijkstra)"
                : "var(--accent-astar)",
          );

        isRunning = false;
        animCancel = false;
        document.getElementById("runBtn").textContent = "▶ Run";
      }

      function generateMaze() {
        clearPath();
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            if (grid[r][c] !== START && grid[r][c] !== END) grid[r][c] = WALL;

        function carve(r, c) {
          grid[r][c] = EMPTY;
          const dirs = [
            [-2, 0],
            [2, 0],
            [0, -2],
            [0, 2],
          ].sort(() => Math.random() - 0.5);
          for (const [dr, dc] of dirs) {
            const nr = r + dr,
              nc = c + dc;
            if (
              nr > 0 &&
              nr < ROWS - 1 &&
              nc > 0 &&
              nc < COLS - 1 &&
              grid[nr][nc] === WALL
            ) {
              grid[r + dr / 2][c + dc / 2] = EMPTY;
              carve(nr, nc);
            }
          }
        }

        const sr = startCell.r % 2 === 0 ? startCell.r + 1 : startCell.r;
        const sc = startCell.c % 2 === 0 ? startCell.c + 1 : startCell.c;
        carve(sr, sc);

        grid[startCell.r][startCell.c] = START;
        grid[endCell.r][endCell.c] = END;
        drawAll();
      }

      document.querySelectorAll(".algo-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".algo-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentAlgo = btn.dataset.algo;
        });
      });

      document.querySelectorAll(".tool-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".tool-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentTool = btn.dataset.tool;
        });
      });

      document.getElementById("runBtn").addEventListener("click", run);
      document.getElementById("clearBtn").addEventListener("click", () => {
        if (!isRunning) clearPath();
      });
      document.getElementById("resetBtn").addEventListener("click", () => {
        if (!isRunning) {
          initGrid();
          drawAll();
          clearPath();
        }
      });
      document.getElementById("mazeBtn").addEventListener("click", () => {
        if (!isRunning) generateMaze();
      });

      initGrid();
      drawAll();
    </script>
  </body>
</html>
